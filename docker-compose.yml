# PostgreSQL de desenvolvimento.
# Uso: copie `.env.example` para `.env` na raiz e defina `POSTGRES_PASSWORD`, depois:
#   docker compose up -d
# O Compose carrega variáveis de `.env` para substituição e para o container.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: valora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env at repo root}
      POSTGRES_DB: valora
    ports:
      - "5434:5432"
    volumes:
      - valora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valora -d valora"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  valora_postgres_data:
