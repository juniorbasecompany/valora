# Monorepo: build a partir da raiz com Docker (backend em ./backend).
# Garante que o Railway não tenta o Railpack só com a árvore da raiz.
#
# Variáveis no serviço "valora" (obrigatório para o processo subir e o healthcheck passar):
# - Liga o plugin Postgres ao backend com UMA destas opções:
#   (A) DATABASE_URL = referência ${{ NomeDoTeuPostgres.DATABASE_URL }} (usa o nome exato do serviço Postgres no canvas).
#   (B) Ou referencia PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE do Postgres (o backend aceita estes nomes).
# - Só POSTGRES_PASSWORD manual não chega: o default de host é localhost e porta 5434, o que dentro do
#   container não aponta para o Postgres do Railway. Ou defines DATABASE_URL / PG*, ou POSTGRES_HOST na rede interna.
# - APP_JWT_SECRET, GOOGLE_CLIENT_ID: como no .env local.
# - PORT é injetado pelo Railway (não precisas criar).
# - O Postgres do Railway exige TLS: se usares só PGHOST/PG* (sem DATABASE_URL completa),
#   o backend acrescenta sslmode=require quando RAILWAY_ENVIRONMENT está definido.
#   Noutro PaaS: define VALORA_FORCE_POSTGRES_SSL=1 se precisares do mesmo comportamento.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Usa o CMD do Dockerfile (sh -c + ${PORT:-8000}). Um startCommand aqui sem shell pode
# deixar $PORT literal e o Uvicorn nunca escuta na porta que o healthcheck usa.
healthcheckPath = "/health"
