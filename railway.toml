# Monorepo: build a partir da raiz com Docker (backend em ./backend).
# Garante que o Railway não tenta o Railpack só com a árvore da raiz.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Comando explícito: o Railway injeta PORT; evita ambiguidade com imagem Docker.
startCommand = "uvicorn valora_backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
